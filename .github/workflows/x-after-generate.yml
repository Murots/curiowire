name: CurioWire X Poster

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "CurioWire Auto Article Generator"
      - "CurioWire Weekly List Article Generator"
    types: [completed]

jobs:
  x-post:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment: Production

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SITE_URL: ${{ secrets.SITE_URL }}

      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      X_OPENAI_MODEL: ${{ secrets.X_OPENAI_MODEL }}

      X_POSTING_ENABLED: ${{ secrets.X_POSTING_ENABLED }}
      X_DISCOVERY_ENABLED: ${{ secrets.X_DISCOVERY_ENABLED }}

      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}

      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm ci

      - name: Post latest article to X
        run: node scripts/x-post-latest.js

      - name: Build engagement queue
        run: node scripts/x-build-engagement-queue.js

      - name: Build operator queue
        run: node scripts/x-build-operator-queue.js
