name: CurioWire Auto Quote Article Generator

on:
  workflow_dispatch:
  schedule:
    # 🗣️ Quote articles: Tuesdays and Saturdays at 06:00 UTC
    - cron: "0 6 * * 2"
    - cron: "0 6 * * 6"

concurrency:
  group: curiowire-production-quote
  cancel-in-progress: false

jobs:
  generate-quote:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: Production

    env:
      # === OpenAI ===
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_ORG_ID: ${{ secrets.OPENAI_ORG_ID }}

      # Article / verification models
      PREMISE_GATE_MODEL: ${{ secrets.PREMISE_GATE_MODEL }}
      FACTCHECK_MODEL: ${{ secrets.FACTCHECK_MODEL }}
      ARTICLE_MODEL: ${{ secrets.ARTICLE_MODEL }}
      SUMMARY_MODEL: ${{ secrets.SUMMARY_MODEL }}
      REFINE_MODEL: ${{ secrets.REFINE_MODEL }}

      ARTICLE_PLANNER_MODEL: ${{ secrets.ARTICLE_PLANNER_MODEL }}

      # Scene prompt models
      SCENE_BLUEPRINT_MODEL: ${{ secrets.SCENE_BLUEPRINT_MODEL }}
      SCENE_FORMAT_MODEL: ${{ secrets.SCENE_FORMAT_MODEL }}

      # === Supabase ===
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # === Media APIs ===
      NEXT_PUBLIC_UNSPLASH_ACCESS_KEY: ${{ secrets.NEXT_PUBLIC_UNSPLASH_ACCESS_KEY }}
      NEXT_PUBLIC_PEXELS_API_KEY: ${{ secrets.NEXT_PUBLIC_PEXELS_API_KEY }}
      NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm ci

      - name: 🗣️ Generate quote article
        run: node scripts/generateQuoteArticle.js
