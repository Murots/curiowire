name: CurioWire Auto Article Generator

on:
  workflow_dispatch:
  # schedule:
  #   # 📰 Articles: 4 times per day
  #   - cron: "0 0,6,12,18 * * *"
  schedule:
    # 📰 Articles: 3 times per day
    - cron: "0 0,8,16 * * *"

concurrency:
  group: curiowire-production
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: Production

    env:
      # === OpenAI ===
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_ORG_ID: ${{ secrets.OPENAI_ORG_ID }}

      # Your article-check models
      PREMISE_GATE_MODEL: ${{ secrets.PREMISE_GATE_MODEL }}
      FACTCHECK_MODEL: ${{ secrets.FACTCHECK_MODEL }}
      SALVAGE_MODEL: ${{ secrets.SALVAGE_MODEL }}
      ARTICLE_MODEL: ${{ secrets.ARTICLE_MODEL }}
      SUMMARY_MODEL: ${{ secrets.SUMMARY_MODEL }}
      REFINE_MODEL: ${{ secrets.REFINE_MODEL }}

      ARTICLE_PLANNER_MODEL: ${{ secrets.ARTICLE_PLANNER_MODEL }}
      SOURCE_RESOLVER_MODEL: ${{ secrets.SOURCE_RESOLVER_MODEL }}

      # Scene prompt models
      SCENE_BLUEPRINT_MODEL: ${{ secrets.SCENE_BLUEPRINT_MODEL }}
      SCENE_FORMAT_MODEL: ${{ secrets.SCENE_FORMAT_MODEL }}

      # === Supabase ===
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # === Media APIs ===
      NEXT_PUBLIC_UNSPLASH_ACCESS_KEY: ${{ secrets.NEXT_PUBLIC_UNSPLASH_ACCESS_KEY }}
      NEXT_PUBLIC_PEXELS_API_KEY: ${{ secrets.NEXT_PUBLIC_PEXELS_API_KEY }}
      NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}

      # === Reddit ===
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm ci

      - name: 📰 Generate articles
        run: node scripts/generate.js
